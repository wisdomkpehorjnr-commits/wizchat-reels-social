<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WizChat — Social Chat & Reels</title>
    <meta name="description" content="WizChat: Chat, share reels, stories, and connect with friends. Install for the best experience." />
    <meta name="author" content="WizChat" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WizChat" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/lovable-uploads/3af45968-ee0a-4afb-9557-c058030ab8dc.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta property="og:title" content="WizChat" />
    <meta property="og:description" content="Chat, share reels, stories, and connect with friends." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/lovable-uploads/3af45968-ee0a-4afb-9557-c058030ab8dc.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/lovable-uploads/3af45968-ee0a-4afb-9557-c058030ab8dc.png" />
  </head>

  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg, rgba(16,185,129,0.12) 0%, rgba(0,0,0,0.85) 40%, rgba(16,185,129,0.08) 100%);backdrop-filter:blur(40px);">
        <img src="/lovable-uploads/3af45968-ee0a-4afb-9557-c058030ab8dc.png" alt="WizChat" style="width:96px;height:96px;border-radius:24px;box-shadow:0 0 60px rgba(16,185,129,0.3);margin-bottom:24px;" />
        <div style="color:white;font-size:32px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin-bottom:8px;opacity:0;animation:splash-fade 0.5s 0.2s forwards;">Welcome</div>
        <div style="color:rgba(255,255,255,0.5);font-size:13px;letter-spacing:0.5px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;opacity:0;animation:splash-fade 0.5s 0.5s forwards;">Your social world, beautifully connected</div>
        <div style="display:flex;gap:6px;margin-top:32px;">
          <div style="width:8px;height:8px;border-radius:50%;background:#34d399;animation:splash-dot 0.8s infinite;animation-delay:0s;"></div>
          <div style="width:8px;height:8px;border-radius:50%;background:#34d399;animation:splash-dot 0.8s infinite;animation-delay:0.15s;"></div>
          <div style="width:8px;height:8px;border-radius:50%;background:#34d399;animation:splash-dot 0.8s infinite;animation-delay:0.3s;"></div>
        </div>
        <style>
          @keyframes splash-fade{to{opacity:1}}
          @keyframes splash-dot{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:1}}
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
