<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>WizChat — No Internet</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #0a0a0a;
    --muted: rgba(10,10,10,0.6);
    --card: rgba(0,0,0,0.03);
    --border: rgba(0,0,0,0.08);
    --btn-bg: #16a34a;
    --btn-fg: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #ffffff;
      --muted: rgba(255,255,255,0.65);
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --btn-bg: #ffffff;
      --btn-fg: #0a0a0a;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    -webkit-font-smoothing: antialiased; }
  .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card {
    width: 100%; max-width: 360px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 44px 32px;
    text-align: center;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.25);
  }
  .icon { width: 64px; height: 64px; margin: 0 auto 22px; display: block; color: var(--fg); }
  h1 { font-size: 24px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.01em; }
  p { font-size: 14px; line-height: 1.55; color: var(--muted); margin: 0 0 28px; }
  button {
    width: 100%; padding: 14px 24px; border-radius: 999px; border: none;
    background: var(--btn-bg); color: var(--btn-fg); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s ease, transform .1s ease; font-family: inherit;
  }
  button:hover { opacity: 0.92; }
  button:active { transform: scale(0.98); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M1 1l22 22"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>No Internet</h1>
    <p>Your device is currently offline.<br/>Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</div>
<script>
  window.addEventListener('online', () => location.reload());
</script>
</body>
</html>
