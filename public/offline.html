<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WizChat — Offline</title>
<style>
  :root { color-scheme: dark light; }
  html, body { margin: 0; height: 100%; background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card {
    width: 100%; max-width: 360px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 40px 32px;
    text-align: center;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }
  .icon { width: 64px; height: 64px; margin: 0 auto 20px; display: block; }
  h1 { font-size: 24px; font-weight: 700; margin: 0 0 12px; }
  p { font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.65); margin: 0 0 28px; }
  button {
    width: 100%; padding: 14px 24px; border-radius: 999px; border: none;
    background: #fff; color: #0a0a0a; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s ease; font-family: inherit;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  @media (prefers-color-scheme: light) {
    html, body { background: #fff; color: #0a0a0a; }
    .card { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }
    p { color: rgba(0,0,0,0.6); }
    button { background: #0a0a0a; color: #fff; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 1l22 22"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>No Internet</h1>
    <p>Your device is currently offline.<br/>Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</div>
</body>
</html>
